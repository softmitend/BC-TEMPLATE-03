<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024">
  <title>Ada Pesan Untukmu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=desktop-view-1">
</head>
<body class="page-envelope">
  <main class="envelope-screen" aria-label="Halaman pembuka pesan ulang tahun">
    <div class="soft-grid"></div>

    <section class="intro-card">
      <span class="sticker sticker-blue">for you</span>
      <span class="sticker sticker-yellow">open me!</span>
      <span class="deco star star-one">&#9733;</span>
      <span class="deco star star-two">&#10022;</span>
      <span class="deco heart heart-one">&#9829;</span>
      <span class="deco flower flower-one">&#10047;</span>

      <p class="mini-label">special delivery</p>
      <h1>Ada pesan untukmu</h1>
      <p class="intro-text">Klik amplop kecil ini pelan-pelan, ya.</p>

      <!-- Tombol amplop: klik untuk membuka animasi lalu pindah halaman. -->
      <button class="envelope-button" id="openEnvelope" type="button" aria-label="Buka pesan ulang tahun">
        <span class="envelope">
          <span class="envelope-back"></span>
          <span class="letter">
            <span>Ada pesan untukmu</span>
          </span>
          <span class="envelope-front"></span>
          <span class="envelope-flap"></span>
          <span class="seal">&#9829;</span>
        </span>
      </button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
